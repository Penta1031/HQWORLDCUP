<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏆 HQ WORLDCUP 🏆</title>
    
    <!-- 필수 라이브러리 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    
    <!-- Firebase 설정 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.2.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvvsLBtIQ92fRe5VkgKbO9-dGr1n6OXvM",
            authDomain: "hqworldcup-b69fc.firebaseapp.com",
            projectId: "hqworldcup-b69fc",
            storageBucket: "hqworldcup-b69fc.firebasestorage.app",
            messagingSenderId: "107833310403",
            appId: "1:107833310403:web:e8d60c03081d1c62bd7676",
            measurementId: "G-704LTTY9JB"
        };

        try {
            const app = initializeApp(firebaseConfig);
            window.fb = {
                auth: getAuth(app),
                db: getFirestore(app),
                signInAnonymously,
                collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc, getDoc
            };
            window.dispatchEvent(new Event('fb-ready'));
        } catch (e) {
            console.error("Firebase 초기화 에러:", e);
        }
    </script>

    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 24px); }
        body { 
            -webkit-tap-highlight-color: transparent; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: white; color: black; margin: 0; padding: 0; 
            overflow: hidden; height: 100vh; height: -webkit-fill-available;
        }
        #root { height: 100%; }
        
        .twitter-tweet { margin: 0 !important; display: flex !important; justify-content: center !important; width: 100% !important; }
        .twitter-tweet-rendered { width: 100% !important; max-width: 500px !important; margin: 0 !important; border: none !important; box-shadow: none !important; }
        iframe { border-radius: 12px !important; border: none !important; background-color: transparent !important; }
        
        /* 스크롤 가독성을 위한 컨테이너 */
        .app-main-wrapper { height: 100%; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        .scroll-area { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        
        .game-container { height: 100%; display: flex; flex-direction: column; overflow: hidden; position: fixed; top: 0; left: 0; width: 100%; z-index: 10; }
        .bottom-safe-padding { padding-bottom: calc(var(--safe-bottom) + 35px); }

        input, textarea { font-size: 16px !important; color: black !important; }
        ::-webkit-scrollbar { width: 0; background: transparent; }
        
        .text-black-force { color: #000000 !important; }
        .white-text-only { color: #ffffff !important; } 

        .progress-bar-fill { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal-enter { animation: modal-fade 0.2s ease-out; }
        @keyframes modal-fade { from { opacity: 0; transform: scale(0.98); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-white">
    <div id="root" class="flex items-center justify-center h-full text-neutral-300 font-bold uppercase tracking-widest text-xs">
        CONNECTING TO HQ SYSTEM...
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const DB_ID = 'twitter-video-wc-pro';

        const Icon = ({ name, size = 24, className = "", color = "#000000" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    lucide.createIcons({ attrs: { stroke: color, 'stroke-width': 2.5 }, nameMap: { [name]: iconRef.current } });
                }
            }, [name, color]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('home'); 
            const [worldcups, setWorldcups] = useState([]);
            const [loading, setLoading] = useState(true);
            const [selectedWc, setSelectedWc] = useState(null);
            const [champion, setChampion] = useState(null);
            const [matchIndex, setMatchIndex] = useState(0);
            const [currentRoundItems, setCurrentRoundItems] = useState([]);
            const [winners, setWinners] = useState([]);
            const [roundName, setRoundName] = useState('');
            const [adminPassword, setAdminPassword] = useState('');
            const [bulkText, setBulkText] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [wcType, setWcType] = useState('video');
            const [rankingWc, setRankingWc] = useState(null);

            useEffect(() => {
                const initApp = async () => {
                    if (!window.fb) return;
                    try {
                        const { auth, signInAnonymously, db, collection, onSnapshot } = window.fb;
                        await signInAnonymously(auth);
                        
                        const wcRef = collection(db, 'artifacts', DB_ID, 'public', 'data', 'worldcups');
                        onSnapshot(wcRef, (snapshot) => {
                            const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                            setWorldcups(docs);
                            setLoading(false);
                        });
                    } catch (e) { console.error("Firebase Error:", e); }
                };

                if (window.fb) initApp();
                else window.addEventListener('fb-ready', initApp);

                const script = document.createElement('script');
                script.src = "https://platform.twitter.com/widgets.js";
                script.async = true;
                document.body.appendChild(script);
            }, []);

            useEffect(() => {
                if (selectedWc?.type === 'video' && window.twttr && window.twttr.widgets) {
                    const timer = setTimeout(() => window.twttr.widgets.load(), 150);
                    return () => clearTimeout(timer);
                }
            }, [view, matchIndex, champion, selectedWc]);

            const startTournament = (wc) => {
                const shuffled = [...wc.entries].sort(() => Math.random() - 0.5);
                setSelectedWc(wc);
                setChampion(null);
                setMatchIndex(0);
                setWinners([]);
                initRound(shuffled);
                setView('game');
            };

            const initRound = (items) => {
                setCurrentRoundItems(items); setWinners([]); setMatchIndex(0);
                const count = items.length;
                if (count > 16) setRoundName("32강");
                else if (count > 8) setRoundName("16강");
                else if (count > 4) setRoundName("8강");
                else if (count > 2) setRoundName("4강");
                else if (count === 2) setRoundName("결승전");
            };

            const updateWinRecord = async (winnerVideo) => {
                const { db, doc, updateDoc } = window.fb;
                try {
                    const wcRef = doc(db, 'artifacts', DB_ID, 'public', 'data', 'worldcups', selectedWc.id);
                    const updatedEntries = selectedWc.entries.map(entry => {
                        if (entry.url === winnerVideo.url) {
                            return { ...entry, winCount: (entry.winCount || 0) + 1 };
                        }
                        return entry;
                    });
                    await updateDoc(wcRef, { entries: updatedEntries });
                    setChampion(updatedEntries.find(e => e.url === winnerVideo.url));
                } catch (e) { console.error("Win Count fail:", e); }
            };

            const selectWinner = (winner) => {
                const nextWinners = [...winners, winner];
                setWinners(nextWinners);
                if ((matchIndex + 1) * 2 < currentRoundItems.length) {
                    setMatchIndex(matchIndex + 1);
                } else {
                    if (nextWinners.length === 1) {
                        setChampion(nextWinners[0]);
                        updateWinRecord(nextWinners[0]);
                    } else {
                        initRound(nextWinners);
                    }
                }
            };

            const handleDelete = async (id) => {
                if (!window.confirm("이 월드컵을 삭제하시겠습니까? 🗑️")) return;
                const { db, doc, deleteDoc } = window.fb;
                try {
                    await deleteDoc(doc(db, 'artifacts', DB_ID, 'public', 'data', 'worldcups', id));
                    alert("삭제되었습니다.");
                } catch (e) { alert("삭제 실패"); }
            };

            const ContentRenderer = ({ item, type, playerKey }) => {
                const boxStyle = "w-full aspect-square flex items-center justify-center relative bg-neutral-50 border border-neutral-100 rounded-2xl overflow-hidden shadow-sm";
                
                if (type === 'image') {
                    return (
                        <div key={`${playerKey}-${item.url}`} className="flex-1 flex flex-col min-h-0 w-full overflow-hidden">
                            <div className="py-1.5 px-4 text-center shrink-0"><h3 className="text-[12px] font-bold truncate leading-none text-black-force">{item.title}</h3></div>
                            <div className="flex-1 min-h-0 flex items-center justify-center overflow-hidden px-4">
                                <div className={boxStyle}>
                                    <img src={item.url} className="w-full h-full object-contain" alt={item.title} />
                                </div>
                            </div>
                        </div>
                    );
                }

                if (type === 'text') {
                    return (
                        <div key={`${playerKey}-${item.url}`} className="flex-1 flex flex-col min-h-0 w-full overflow-hidden">
                            <div className="py-1.5 px-4 text-center shrink-0"><h3 className="text-[12px] font-bold truncate leading-none text-black-force opacity-20">{item.title}</h3></div>
                            <div className="flex-1 min-h-0 flex items-center justify-center overflow-hidden px-4">
                                <div className={`${boxStyle} p-8 bg-neutral-50 border-dashed border-2`}>
                                    <p className="text-black-force font-black text-lg text-center leading-relaxed whitespace-pre-wrap">{item.url}</p>
                                </div>
                            </div>
                        </div>
                    );
                }

                return (
                    <div key={`${playerKey}-${item.url}`} className="flex-1 flex flex-col min-h-0 w-full overflow-hidden text-black-force">
                        <div className="py-1.5 px-4 text-center shrink-0"><h3 className="text-[12px] font-bold truncate leading-none">{item.title}</h3></div>
                        <div className="flex-1 min-h-0 flex items-center justify-center overflow-hidden px-4">
                            <div className={boxStyle}>
                                <div className="w-full scale-[0.82] origin-center flex justify-center">
                                    <blockquote className="twitter-tweet" data-theme="light" data-media-max-width="500" data-chrome="noheader nofooter noborders transparent">
                                        <a href={item.url.replace('x.com', 'twitter.com')}></a>
                                    </blockquote>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            // --- Render Logic ---

            if (view === 'home') return (
                <div className="app-main-wrapper bg-white">
                    <div className="scroll-area px-4 py-6">
                        <header className="py-10 text-center flex flex-col items-center shrink-0">
                            <div className="w-32 h-32 bg-white rounded-full flex items-center justify-center mb-6 border-2 border-neutral-100 shadow-2xl overflow-hidden">
                                <img src="https://pbs.twimg.com/media/G_gkEzbbMAAW4AX?format=jpg&name=large" alt="Visual" className="w-full h-full object-cover" />
                            </div>
                            <h1 className="text-2xl font-black tracking-tighter uppercase italic leading-tight mb-1 text-black-force">🏆 HQ WORLDCUP 🏆</h1>
                            <p className="text-neutral-400 text-[9px] font-bold tracking-widest uppercase opacity-40 leading-none">Choose your tournament</p>
                        </header>

                        <div className="space-y-2 max-w-2xl mx-auto w-full pb-40">
                            {loading ? <div className="text-center py-20 font-bold text-neutral-200 animate-pulse tracking-widest uppercase">Connecting...</div> :
                             worldcups.map(wc => (
                                <div key={wc.id} className="flex gap-2 items-center text-black-force">
                                    <button onClick={() => startTournament(wc)} className="flex-1 h-14 bg-white px-6 rounded-2xl border border-neutral-100 shadow-sm flex items-center justify-between active:bg-neutral-50 transition-all overflow-hidden">
                                        <div className="text-left truncate mr-4 flex items-center gap-3">
                                            <span className="text-lg opacity-40 shrink-0">{wc.type === 'video' ? '📹' : wc.type === 'image' ? '🖼️' : '💬'}</span>
                                            <div className="truncate">
                                                <h2 className="text-sm font-black truncate leading-tight">{wc.title}</h2>
                                                <p className="text-[8px] text-neutral-400 font-bold uppercase tracking-tighter mt-0.5">{wc.entries.length} ITEMS</p>
                                            </div>
                                        </div>
                                        <Icon name="play" color="#000000" size={16} className="shrink-0" />
                                    </button>
                                    <button onClick={() => setRankingWc(wc)} className="w-14 h-14 bg-neutral-50 border border-neutral-100 rounded-2xl flex flex-col items-center justify-center shadow-sm active:scale-90 transition-all shrink-0">
                                        <span className="text-sm">🏆</span>
                                        <span className="text-[7px] font-black mt-0.5 opacity-60 uppercase text-black-force tracking-tighter">Record</span>
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>

                    {rankingWc && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm" onClick={() => setRankingWc(null)}>
                            <div className="bg-white w-full max-w-md max-h-[70vh] rounded-[2rem] p-8 flex flex-col shadow-2xl modal-enter" onClick={e => e.stopPropagation()}>
                                <header className="flex justify-between items-center mb-6 shrink-0">
                                    <div className="flex flex-col text-left text-black-force">
                                        <h3 className="font-black text-lg leading-tight uppercase">🏅 Win Ranking</h3>
                                        <p className="text-[9px] font-bold text-neutral-400 truncate max-w-[200px] uppercase mt-1">Hall of Fame</p>
                                    </div>
                                    <button onClick={() => setRankingWc(null)} className="p-2 opacity-30"><Icon name="x" size={24}/></button>
                                </header>
                                <div className="flex-1 overflow-y-auto space-y-2 pr-1 text-black-force">
                                    {[...rankingWc.entries]
                                        .sort((a, b) => (b.winCount || 0) - (a.winCount || 0))
                                        .map((entry, idx) => (
                                        <div key={idx} className="p-3 bg-neutral-50 rounded-xl flex items-center justify-between border border-neutral-100">
                                            <div className="flex items-center gap-3 truncate text-left">
                                                <span className={`w-6 h-6 rounded-full flex items-center justify-center font-black text-[9px] ${idx === 0 ? 'bg-yellow-400 white-text-only border-none' : 'bg-neutral-200 border-none'}`}>{idx + 1}</span>
                                                <p className="font-bold text-xs truncate">{entry.title}</p>
                                            </div>
                                            <div className="flex items-center gap-1 ml-4 shrink-0">
                                                <span className="font-black text-blue-600 text-xs">{entry.winCount || 0}</span>
                                                <span className="text-[8px] font-bold opacity-30 uppercase">Wins</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    <button onClick={() => setView('admin_auth')} className="fixed bottom-12 right-6 px-5 h-12 bg-black rounded-full flex items-center justify-center shadow-2xl active:scale-95 z-50 border-none">
                        <span className="text-white white-text-only font-bold text-xs">⚙️ 설정</span>
                    </button>
                </div>
            );

            if (view === 'admin_auth') return (
                <div className="h-full flex flex-col items-center justify-center p-8 bg-white text-center text-black-force">
                    <Icon name="lock" size={48} className="mb-6 opacity-10" />
                    <h2 className="text-xl font-black mb-8 uppercase tracking-widest leading-none">Admin Auth</h2>
                    <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && setView(adminPassword === '0000' ? 'admin' : 'admin_auth')} className="w-full max-w-xs border-b-2 border-neutral-100 py-4 text-center text-3xl tracking-[0.5em] outline-none focus:border-black transition-all bg-transparent text-black-force" placeholder="****" autoFocus />
                    <button onClick={() => { if(adminPassword === '0000') setView('admin'); else alert('Password Fail'); }} className="w-full max-w-xs bg-black py-4 rounded-xl active:scale-95 shadow-xl mt-8 border-none flex items-center justify-center text-white font-bold uppercase">Enter</button>
                    <button onClick={() => setView('home')} className="mt-8 font-bold underline opacity-20 text-xs text-center uppercase tracking-tighter">Back Home</button>
                </div>
            );

            if (view === 'admin') return (
                <div className="app-main-wrapper bg-white text-black-force">
                    {/* 관리자 전체 영역 스크롤 활성화 및 하단 여백 추가 */}
                    <div className="scroll-area p-6 pb-60">
                        <header className="flex justify-between items-center mb-8 shrink-0">
                            <button onClick={() => { setView('home'); setEditingId(null); setBulkText(''); }}><Icon name="arrow-left" /></button>
                            <h1 className="font-black text-neutral-400 text-[10px] uppercase tracking-widest italic leading-none">Management</h1>
                            <div className="w-10"></div>
                        </header>
                        
                        <div className="w-full max-w-4xl mx-auto space-y-6">
                            <div className="flex gap-2">
                                {['video', 'image', 'text'].map(type => (
                                    <button key={type} onClick={() => setWcType(type)} className={`flex-1 py-3 rounded-xl font-bold text-xs border-2 transition-all ${wcType === type ? 'border-black bg-black text-white white-text-only' : 'border-neutral-100 text-neutral-400 bg-neutral-50'}`}>
                                        {type === 'video' ? '📹 영상' : type === 'image' ? '🖼️ 이미지' : '💬 대사'}
                                    </button>
                                ))}
                            </div>

                            <textarea 
                                value={bulkText} 
                                onChange={e => setBulkText(e.target.value)} 
                                className="w-full h-[300px] bg-neutral-50 border border-neutral-100 rounded-2xl p-6 font-mono text-[11px] outline-none text-black-force leading-relaxed shadow-inner" 
                                placeholder={wcType === 'text' 
                                    ? "형식:\n월드컵 타이틀\n대사 1\n대사 2\n대사 3\n..." 
                                    : "형식:\n월드컵 타이틀\n항목 제목 1\n링크 1\n항목 제목 2\n링크 2\n..."} 
                            />
                            
                            <button onClick={async (e) => {
                                if(!bulkText.trim()) return;
                                const btn = e.currentTarget; btn.disabled = true;
                                const lines = bulkText.split('\n').map(l => l.trim()).filter(l => l !== "");
                                if (lines.length < 2) { alert("정보가 부족합니다."); btn.disabled = false; return; }

                                const title = lines[0];
                                const entries = [];
                                if (wcType === 'text') {
                                    lines.slice(1).forEach((text, i) => {
                                        entries.push({ id: i, title: text.substring(0, 15) + (text.length > 15 ? '...' : ''), url: text, winCount: 0 });
                                    });
                                } else {
                                    for (let i = 1; i < lines.length; i += 2) {
                                        if (lines[i] && lines[i+1]) {
                                            entries.push({ id: entries.length, title: lines[i], url: lines[i+1], winCount: 0 });
                                        }
                                    }
                                }

                                try {
                                    const { db, collection, addDoc, serverTimestamp, doc, updateDoc } = window.fb;
                                    const payload = { title, entries, type: wcType };
                                    if (editingId) {
                                        await updateDoc(doc(db, 'artifacts', DB_ID, 'public', 'data', 'worldcups', editingId), payload);
                                        alert("수정 완료! ✏️");
                                    } else {
                                        await addDoc(collection(db, 'artifacts', DB_ID, 'public', 'data', 'worldcups'), { ...payload, createdAt: serverTimestamp() });
                                        alert("발행 성공! 🚀");
                                    }
                                    setBulkText(''); setEditingId(null); setView('home');
                                } catch(err) { alert("저장 실패"); } finally { btn.disabled = false; }
                            }} className="w-full bg-blue-600 py-4 rounded-xl shadow-xl border-none text-white font-black uppercase tracking-widest text-xs">
                                {editingId ? 'Save Edits' : 'Publish Worldcup'}
                            </button>

                            <div className="space-y-2 pt-10 border-t border-neutral-100">
                                <p className="text-[9px] font-black text-neutral-400 uppercase italic opacity-60 text-left mb-4 tracking-tighter">Registered Worldcups</p>
                                {worldcups.map(wc => (
                                    <div key={wc.id} className="p-3 bg-neutral-50 rounded-xl flex items-center justify-between border border-neutral-100 shadow-sm">
                                        <div className="flex items-center gap-2 truncate text-left">
                                            <span className="opacity-40 text-xs">{wc.type === 'video' ? '📹' : wc.type === 'image' ? '🖼️' : '💬'}</span>
                                            <span className="text-xs font-bold truncate">{wc.title}</span>
                                        </div>
                                        <div className="flex gap-2 shrink-0">
                                            <button onClick={() => { 
                                                let formatted = "";
                                                if (wc.type === 'text') formatted = [wc.title, ...wc.entries.map(e => e.url)].join('\n');
                                                else formatted = [wc.title, ...wc.entries.flatMap(e => [e.title, e.url])].join('\n');
                                                setBulkText(formatted); setWcType(wc.type || 'video'); setEditingId(wc.id); 
                                                document.querySelector('.scroll-area').scrollTo({ top: 0, behavior: 'smooth' });
                                            }} className="w-9 h-9 bg-white rounded-lg border border-neutral-200 flex items-center justify-center text-sm shadow-sm">✏️</button>
                                            <button onClick={() => handleDelete(wc.id)} className="w-9 h-9 bg-white rounded-lg border border-neutral-200 flex items-center justify-center text-sm shadow-sm text-red-500">🗑️</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (view === 'game') {
                const totalMatchesInRound = Math.floor(currentRoundItems.length / 2);
                const progressPercent = ((matchIndex + 1) / totalMatchesInRound) * 100;

                return (
                    <div className="game-container bg-white">
                        {!champion && (
                            <div className="w-full h-0.5 bg-neutral-100 shrink-0">
                                <div className="h-full bg-black progress-bar-fill" style={{ width: `${progressPercent}%` }} />
                            </div>
                        )}

                        {champion ? (
                            <div className="flex-1 flex flex-col items-center justify-center p-8 text-center animate-in zoom-in-95 overflow-hidden text-black-force">
                                <div className="flex flex-col items-center justify-center shrink-0 w-full mb-4">
                                    <Icon name="trophy" color="#fbbf24" className="mb-4 scale-[1.2] drop-shadow-xl" size={64} />
                                    <h2 className="text-base font-black px-6 leading-tight mb-2 truncate max-w-sm">{champion.title}</h2>
                                    <div className="bg-yellow-400 px-3 py-0.5 rounded-full shadow-sm flex items-center justify-center mb-4 leading-none border-none">
                                        <span className="text-[10px] font-black tracking-tight leading-none uppercase">🏆 Total Wins: {champion.winCount || 0}</span>
                                    </div>
                                </div>
                                
                                <div className="w-full max-w-[380px] aspect-square flex items-center justify-center rounded-[2rem] overflow-hidden bg-neutral-50 border border-neutral-100 shadow-2xl relative mb-12 shrink-0">
                                    <ContentRenderer item={champion} type={selectedWc.type} playerKey="winner" />
                                </div>
                                
                                <div className="w-full flex justify-center shrink-0 bottom-safe-padding px-6">
                                    {/* HOME 버튼 내부 정중앙 정렬 완성 */}
                                    <button onClick={() => {setView('home'); setChampion(null);}} className="w-full max-w-[240px] h-14 bg-black rounded-xl shadow-xl active:scale-95 flex items-center justify-center border-none">
                                        <span className="font-black text-white white-text-only text-sm text-center leading-none tracking-[0.2em] w-full">HOME</span>
                                    </button>
                                </div>
                            </div>
                        ) : (
                            <>
                                <header className="h-12 shrink-0 flex items-center justify-between px-6 border-b border-neutral-100 bg-white">
                                    <div className="flex flex-col text-left text-black-force">
                                        <span className="text-[10px] font-black text-blue-600 leading-none uppercase tracking-tighter">{roundName}</span>
                                        <h1 className="text-xs font-bold truncate max-w-[140px] mt-0.5 leading-none">{selectedWc?.title}</h1>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="px-2 py-0.5 bg-black rounded-full leading-none flex items-center justify-center h-5">
                                            <span className="text-[9px] font-black text-white white-text-only tracking-tighter leading-none">{matchIndex + 1} / {totalMatchesInRound}</span>
                                        </div>
                                        <button onClick={() => setView('home')} className="p-1 opacity-20"><Icon name="x" size={22} /></button>
                                    </div>
                                </header>
                                <main className="flex-1 flex flex-col min-h-0 py-1 bg-white">
                                    <ContentRenderer item={currentRoundItems[matchIndex * 2]} type={selectedWc.type} playerKey="up" />
                                    <div className="h-4 flex items-center justify-center relative shrink-0">
                                        <div className="absolute w-full h-[1px] bg-neutral-100"></div>
                                        <div className="relative z-10 px-3 bg-white text-[9px] font-black italic opacity-20 uppercase tracking-widest leading-none text-black-force">VS</div>
                                    </div>
                                    {currentRoundItems[matchIndex * 2 + 1] ? (
                                        <ContentRenderer item={currentRoundItems[matchIndex * 2 + 1]} type={selectedWc.type} playerKey="down" />
                                    ) : (
                                        <div className="flex-1 flex items-center justify-center text-[10px] opacity-20 font-bold text-black-force uppercase tracking-tighter">Auto Pass</div>
                                    )}
                                </main>
                                <footer className="shrink-0 grid grid-cols-2 gap-4 px-6 pt-3 bottom-safe-padding bg-white border-t border-neutral-50 shadow-[0_-10px_30px_rgba(0,0,0,0.02)]">
                                    <button onClick={() => selectWinner(currentRoundItems[matchIndex * 2])} className="h-16 bg-[#FF4646] rounded-xl flex items-center justify-center active:opacity-80 shadow-md border-none white-text-only font-black text-xl uppercase">UP</button>
                                    <button onClick={() => currentRoundItems[matchIndex * 2 + 1] && selectWinner(currentRoundItems[matchIndex * 2 + 1])} disabled={!currentRoundItems[matchIndex * 2 + 1]} className="h-16 bg-[#4673FF] rounded-xl flex items-center justify-center active:opacity-80 shadow-md disabled:opacity-10 border-none white-text-only font-black text-xl uppercase">DOWN</button>
                                </footer>
                            </>
                        )}
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
