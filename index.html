<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>🏆 HQ WORLDCUP 🏆</title>
    
    <!-- Noto Sans KR -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@100..900&display=swap" rel="stylesheet">

    <!-- Essential Libraries -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Twitter SDK -->
    <script async src="https://platform.twitter.com/widgets.js" charset="utf-8"></script>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp, doc, updateDoc, deleteDoc, getDoc, query } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvvsLBtIQ92fRe5VkgKbO9-dGr1n6OXvM",
            authDomain: "hqworldcup-b69fc.firebaseapp.com",
            projectId: "hqworldcup-b69fc",
            storageBucket: "hqworldcup-b69fc.firebasestorage.app",
            messagingSenderId: "107833310403",
            appId: "1:107833310403:web:e8d60c03081d1c62bd7676",
            measurementId: "G-704LTTY9JB"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const auth = getAuth(app);
            const db = getFirestore(app);

            window.fbStore = { 
                auth, db, collection, addDoc, onSnapshot, serverTimestamp, 
                doc, updateDoc, deleteDoc, getDoc, query, signInAnonymously 
            };
            window.dispatchEvent(new Event('fb-initialized-success'));
        } catch (e) {
            console.error("Firebase Error", e);
        }
    </script>

    <style>
        :root { --safe-bottom: env(safe-area-inset-bottom, 24px); }
        html, body { 
            background-color: white; color: black; margin: 0; padding: 0; 
            height: 100%; width: 100%; overflow: hidden;
            -webkit-tap-highlight-color: transparent; 
            font-family: 'Noto Sans KR', sans-serif;
        }
        #root { height: 100%; width: 100%; }
        
        /* 500x500 순수 비디오 플레이어 규격 */
        .video-player-frame {
            width: 500px;
            height: 500px;
            max-width: 90vw;
            max-height: 42vh; /* 모바일 대응: 높이 제한 상향 */
            background: #000;
            border-radius: 24px;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .twitter-video { margin: 0 !important; width: 100% !important; display: flex !important; justify-content: center !important; }
        iframe { border-radius: 0 !important; border: none !important; width: 100% !important; height: 100% !important; }

        .scroller-view { 
            height: 100%; width: 100%; overflow-y: auto; 
            -webkit-overflow-scrolling: touch; 
            display: flex; flex-direction: column; 
        }
        
        .game-overlay-fixed { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            display: flex; flex-direction: column; overflow: hidden; z-index: 100; 
            background: white;
        }

        ::-webkit-scrollbar { width: 0; background: transparent; }
        .progress-bar-fill { transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .fade-in-ani { animation: fade-in 0.4s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes fade-in { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .modal-bg-ani { animation: modal-bg 0.3s ease-out; }
        @keyframes modal-bg { from { opacity: 0; } to { opacity: 1; } }

        .shadow-premium { box-shadow: 0 15px 45px rgba(0,0,0,0.06); width: 100%; }
    </style>
</head>
<body class="bg-white">
    <div id="root">
        <div class="flex flex-col items-center justify-center h-full text-neutral-300 font-bold uppercase text-[10px] tracking-widest animate-pulse">
            System Initializing...
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const COLLECTION_ID = 'twitter-video-wc-pro';
        const MASTER_PASS = '1028hqwc'; 

        const App = () => {
            const [isLoaded, setIsLoaded] = useState(false);
            const [view, setView] = useState('home'); 
            const [worldcups, setWorldcups] = useState([]);
            const [dataLoading, setDataLoading] = useState(true);
            const [toast, setToast] = useState(null);
            
            // 플레이 데이터
            const [selectedWc, setSelectedWc] = useState(null);
            const [champion, setChampion] = useState(null);
            const [matchIndex, setMatchIndex] = useState(0);
            const [currentRoundItems, setCurrentRoundItems] = useState([]);
            const [winners, setWinners] = useState([]);
            const [roundName, setRoundName] = useState('');
            
            // UI 상태
            const [adminPw, setAdminPw] = useState('');
            const [bulkText, setBulkText] = useState('');
            const [wcType, setWcType] = useState('video');
            const [rankingWc, setRankingWc] = useState(null);
            const [zoomUrl, setZoomUrl] = useState(null);
            const [startNotice, setStartNotice] = useState(null);

            // 편집 상태
            const [visualTitle, setVisualTitle] = useState('');
            const [visualEntries, setVisualEntries] = useState([]);
            const [editingId, setEditingId] = useState(null);

            const showToast = (txt) => {
                setToast(txt);
                setTimeout(() => setToast(null), 3000);
            };

            useEffect(() => {
                const connect = async () => {
                    if (!window.fbStore) return;
                    const { auth, db, collection, onSnapshot, signInAnonymously } = window.fbStore;
                    try {
                        await signInAnonymously(auth);
                        setIsLoaded(true);
                        const wcRef = collection(db, 'artifacts', COLLECTION_ID, 'public', 'data', 'worldcups');
                        onSnapshot(wcRef, (snapshot) => {
                            const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            docs.sort((a, b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));
                            setWorldcups(docs);
                            setDataLoading(false);
                        });
                    } catch (e) { console.error(e); }
                };
                if (window.fbStore) connect();
                else window.addEventListener('fb-initialized-success', connect);
            }, []);

            // 비디오 위젯 강제 리로드
            useEffect(() => {
                if (selectedWc?.type === 'video' && window.twttr && window.twttr.widgets) {
                    const timer = setTimeout(() => {
                        window.twttr.widgets.load();
                    }, 100);
                    return () => clearTimeout(timer);
                }
            }, [view, matchIndex, champion, selectedWc, currentRoundItems]);

            const handleStartMatch = (wc) => {
                if (!wc.entries || wc.entries.length < 2) {
                    showToast("항목이 부족합니다.");
                    return;
                }
                const shuffled = [...wc.entries].sort(() => Math.random() - 0.5);
                setSelectedWc(wc);
                setChampion(null);
                setMatchIndex(0);
                setWinners([]);
                initRound(shuffled);
                setStartNotice(null);
                setView('game');
            };

            const initRound = (items) => {
                setCurrentRoundItems(items); setWinners([]); setMatchIndex(0);
                const count = items.length;
                if (count > 16) setRoundName("32강");
                else if (count > 8) setRoundName("16강");
                else if (count > 4) setRoundName("8강");
                else if (count > 2) setRoundName("4강");
                else if (count === 2) setRoundName("결승전");
            };

            const onSelectItem = async (winner) => {
                const nextWinners = [...winners, winner];
                setWinners(nextWinners);
                if ((matchIndex + 1) * 2 < currentRoundItems.length) {
                    setMatchIndex(matchIndex + 1);
                } else {
                    if (nextWinners.length === 1) {
                        setChampion(nextWinners[0]);
                        const { db, doc, updateDoc } = window.fbStore;
                        const wcRef = doc(db, 'artifacts', COLLECTION_ID, 'public', 'data', 'worldcups', selectedWc.id);
                        const updatedEntries = selectedWc.entries.map(entry => {
                            if (entry.url === winner.url) return { ...entry, winCount: (entry.winCount || 0) + 1 };
                            return entry;
                        });
                        await updateDoc(wcRef, { entries: updatedEntries });
                    } else {
                        initRound(nextWinners);
                    }
                }
            };

            const processImage = (file) => {
                return new Promise((resolve) => {
                    const reader = new FileReader();
                    reader.readAsDataURL(file);
                    reader.onload = (event) => {
                        const img = new Image();
                        img.src = event.target.result;
                        img.onload = () => {
                            const canvas = document.createElement('canvas');
                            const MAX_W = 1000; 
                            let w = img.width, h = img.height;
                            if (w > MAX_W) { h *= MAX_W / w; w = MAX_W; }
                            canvas.width = w; canvas.height = h;
                            const ctx = canvas.getContext('2d');
                            ctx.drawImage(img, 0, 0, w, h);
                            resolve(canvas.toDataURL('image/jpeg', 1.0)); 
                        };
                    };
                });
            };

            const onSave = async () => {
                if (!visualTitle.trim()) { showToast("제목을 입력하세요."); return; }
                let finalData = [];
                if (wcType === 'image') {
                    finalData = visualEntries;
                } else {
                    const blocks = bulkText.split(/\n\n+/).map(b => b.trim()).filter(b => b !== "");
                    finalData = blocks.map((b, i) => {
                        const lines = b.split('\n').map(l => l.trim()).filter(l => l !== "");
                        let url = lines.slice(1).join('\n').replace('x.com', 'twitter.com');
                        return { id: Date.now() + i, title: lines[0], url: url, winCount: 0 };
                    });
                }
                if (finalData.length < 2) { showToast("항목이 부족합니다."); return; }
                const { db, collection, addDoc, doc, updateDoc, serverTimestamp } = window.fbStore;
                const payload = { title: visualTitle, entries: finalData, type: wcType, status: 'published' };
                try {
                    if (editingId) {
                        await updateDoc(doc(db, 'artifacts', COLLECTION_ID, 'public', 'data', 'worldcups', editingId), payload);
                        showToast("수정 완료! ✅");
                    } else {
                        await addDoc(collection(db, 'artifacts', COLLECTION_ID, 'public', 'data', 'worldcups'), { ...payload, createdAt: serverTimestamp() });
                        showToast("발행 성공! 🚀");
                    }
                    setEditingId(null); setVisualTitle(''); setVisualEntries([]); setBulkText('');
                } catch (e) { showToast("저장 실패"); }
            };

            const onAdminAuth = () => {
                if (adminPw === MASTER_PASS) { setView('admin'); setAdminPw(''); }
                else { showToast("비밀번호 에러"); setAdminPw(''); }
            };

            const ItemUI = ({ item, type, isResult = false, onPick }) => {
                const containerClass = isResult 
                    ? "w-full flex flex-col items-center justify-center fade-in-ani px-0.5" 
                    : "w-full h-full flex flex-col relative px-2 cursor-pointer transition-all active:opacity-70";
                
                const cardClass = isResult 
                    ? "w-full bg-white rounded-[2.5rem] overflow-hidden border border-neutral-100 shadow-premium flex flex-col"
                    : "w-full h-full bg-neutral-50 rounded-[2.5rem] overflow-hidden border border-neutral-100 shadow-sm flex flex-col";
                
                const Header = () => (
                    <div className="w-full py-4 px-6 text-center shrink-0 bg-white border-b border-neutral-50 z-20">
                        <h3 className="text-[14px] font-black truncate text-black tracking-tight">{item.title}</h3>
                    </div>
                );

                const handleCardClick = () => {
                    if (!isResult && onPick) onPick(item);
                };

                if (type === 'image') return (
                    <div className={containerClass} onClick={handleCardClick}>
                        <div className={cardClass}>
                            <Header />
                            <div className={`flex-1 min-h-0 flex items-center justify-center ${isResult ? 'py-6' : 'py-2'}`}>
                                <div className="w-full h-full flex items-center justify-center px-1">
                                    <img src={item.url} className="max-w-full max-h-full object-contain" onClick={(e) => {if(isResult){e.stopPropagation(); setZoomUrl(item.url);}}} alt={item.title} />
                                    {isResult && <div className="absolute bottom-6 right-8 bg-white/80 w-10 h-10 flex items-center justify-center rounded-full backdrop-blur-sm text-[12px]">🔍</div>}
                                </div>
                            </div>
                        </div>
                    </div>
                );

                if (type === 'text') return (
                    <div className={containerClass} onClick={handleCardClick}>
                        <div className={cardClass}>
                            <Header />
                            <div className={`flex-1 min-h-0 flex items-center justify-center ${isResult ? 'py-6' : 'py-4'}`}>
                                <div className="w-full h-full flex items-center justify-center overflow-y-auto px-1">
                                    <p className="text-black font-medium text-[13px] text-center leading-[1.8] whitespace-pre-wrap break-keep w-full p-10 font-bold">
                                        {item.url}
                                    </p>
                                </div>
                            </div>
                        </div>
                    </div>
                );

                // --- Pure Video Imbed (500x500) ---
                return (
                    <div className={containerClass} onClick={handleCardClick}>
                        <div className={cardClass}>
                            <Header />
                            <div className={`flex-1 min-h-0 flex items-center justify-center ${isResult ? 'py-10' : 'py-2'}`}>
                                <div className="video-player-frame shadow-2xl" onClick={e => e.stopPropagation()}>
                                    <blockquote className="twitter-video" data-show-caption="false" data-show-other-tweets="false" data-theme="light" data-align="center" data-width="500">
                                        <a href={item.url}></a>
                                    </blockquote>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            if (!isLoaded) return <div className="h-full flex items-center justify-center text-neutral-300 font-bold uppercase text-[10px] tracking-widest animate-pulse">Initializing...</div>;

            if (view === 'home') {
                const visible = worldcups.filter(wc => wc.status !== 'hidden');
                return (
                    <div className="scroller-view bg-white text-black">
                        {toast && <div className="fixed top-8 left-1/2 -translate-x-1/2 z-[1000] bg-black text-white px-6 py-3 rounded-full text-[11px] font-bold shadow-2xl animate-bounce">{toast}</div>}
                        <div className="px-6 py-10 w-full max-w-2xl mx-auto flex flex-col pb-60 text-black">
                            <header className="py-12 text-center flex flex-col items-center shrink-0">
                                <div className="w-32 h-32 bg-white rounded-full flex items-center justify-center mb-8 border-2 border-neutral-100 shadow-2xl overflow-hidden">
                                    <img src="https://pbs.twimg.com/media/G_gkEzbbMAAW4AX?format=jpg&name=large" className="w-full h-full object-cover" />
                                </div>
                                <h1 className="text-2xl font-black tracking-tighter italic mb-1 uppercase">HQ WORLDCUP</h1>
                                <p className="text-neutral-400 text-[9px] font-bold tracking-[0.3em] uppercase opacity-40">SELECT YOUR FAVORITE</p>
                            </header>
                            <div className="space-y-2">
                                {dataLoading ? <div className="text-center py-20 text-neutral-300 font-bold text-[10px] animate-pulse uppercase">Sync...</div> :
                                 visible.map(wc => (
                                    <div key={wc.id} className="flex gap-2 items-center">
                                        <button onClick={() => { if(wc.type==='image') setStartNotice(wc); else handleStartMatch(wc); }} className="flex-1 h-14 bg-white px-6 rounded-2xl border border-neutral-100 shadow-sm flex items-center justify-between active:bg-neutral-50 overflow-hidden text-left">
                                            <div className="truncate mr-4 flex items-center gap-3">
                                                <span className="text-lg opacity-40 shrink-0">{wc.type === 'video' ? '📹' : wc.type === 'image' ? '🖼️' : '💬'}</span>
                                                <div className="truncate">
                                                    <h2 className="text-sm font-bold truncate leading-tight">{wc.title}</h2>
                                                    <p className="text-[8px] text-neutral-400 font-bold uppercase tracking-tighter mt-0.5">{wc.entries.length} ITEMS</p>
                                                </div>
                                            </div>
                                            <span className="text-sm">▶️</span>
                                        </button>
                                        <button onClick={() => setRankingWc(wc)} className="w-14 h-14 bg-neutral-50 border border-neutral-100 rounded-2xl flex flex-col items-center justify-center active:scale-90 shrink-0">
                                            <span className="text-sm">🏆</span>
                                            <span className="text-[7px] font-black mt-0.5 opacity-60 uppercase">Records</span>
                                        </button>
                                    </div>
                                ))}
                            </div>
                        </div>
                        <button onClick={() => setView('admin_auth')} className="fixed bottom-10 right-6 px-5 h-12 bg-black rounded-full flex items-center justify-center shadow-2xl active:scale-95 z-[60] border-none text-white font-bold text-xs uppercase tracking-tighter">⚙️ 설정</button>
                        {rankingWc && (
                            <div className="fixed inset-0 z-[200] flex items-center justify-center p-6 bg-black/40 backdrop-blur-sm" onClick={() => setRankingWc(null)}>
                                <div className="bg-white w-full max-w-md max-h-[70vh] rounded-[2.5rem] p-8 flex flex-col shadow-2xl modal-bg-ani text-black text-black" onClick={e => e.stopPropagation()}>
                                    <header className="flex justify-between items-center mb-6 shrink-0">
                                        <h3 className="font-black text-lg uppercase">🏅 Win Ranking</h3>
                                        <button onClick={() => setRankingWc(null)} className="p-2 opacity-30 text-xl font-bold">✕</button>
                                    </header>
                                    <div className="flex-1 overflow-y-auto space-y-2 pr-1">
                                        {[...rankingWc.entries].sort((a, b) => (b.winCount || 0) - (a.winCount || 0)).map((entry, idx) => (
                                            <div key={idx} className="p-3 bg-neutral-50 rounded-xl flex items-center justify-between border border-neutral-100">
                                                <div className="flex items-center gap-3 truncate text-left">
                                                    <span className={`w-6 h-6 rounded-full flex items-center justify-center font-black text-[9px] ${idx === 0 ? 'bg-yellow-400 text-white' : 'bg-neutral-200'}`}>{idx + 1}</span>
                                                    <p className="font-medium text-xs truncate">{entry.title}</p>
                                                </div>
                                                <div className="flex items-center gap-1 ml-4 shrink-0 font-bold font-black"><span className="text-blue-600 text-xs">{entry.winCount || 0}</span><span className="text-[8px] opacity-30 uppercase ml-1">Wins</span></div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}
                        {startNotice && (
                            <div className="fixed inset-0 z-[1000] bg-black/60 backdrop-blur-sm flex items-center justify-center p-8 modal-bg-ani" onClick={() => setStartNotice(null)}>
                                <div className="bg-white w-full max-w-xs rounded-[2.5rem] p-8 text-center shadow-2xl text-black text-black font-black" onClick={e => e.stopPropagation()}>
                                    <div className="text-3xl mb-6 text-center">ℹ️</div>
                                    <h3 className="font-black text-lg mb-2 text-center uppercase">Image Game</h3>
                                    <p className="text-neutral-400 text-xs font-bold leading-relaxed mb-8 text-center">이미지를 클릭하면 원본을 크게 볼 수 있습니다.</p>
                                    <button onClick={() => handleStartMatch(startNotice)} className="w-full h-14 bg-black rounded-2xl text-white font-black uppercase text-sm active:scale-95 shadow-lg border-none">시작하기</button>
                                </div>
                            </div>
                        )}
                    </div>
                );
            }

            if (view === 'admin_auth') return (
                <div className="scroller-view bg-white items-center justify-center p-8 text-center text-black">
                    <span className="text-4xl mb-6 opacity-20">🔐</span>
                    <h2 className="text-xl font-black mb-8 uppercase tracking-[0.2em]">ADMIN LOGIN</h2>
                    <input type="password" value={adminPw} onChange={e => setAdminPw(e.target.value)} onKeyDown={e => e.key === 'Enter' && onAdminAuth()} className="w-full max-w-xs border-b-2 border-neutral-100 py-4 text-center text-3xl tracking-[0.5em] outline-none focus:border-black transition-all bg-transparent font-mono text-black" placeholder="****" autoFocus />
                    <button onClick={onAdminAuth} className="w-full max-w-xs bg-black py-4 rounded-xl active:scale-95 mt-8 text-white font-bold uppercase shadow-xl border-none">LOGIN</button>
                    <button onClick={() => setView('home')} className="mt-8 font-bold underline opacity-20 text-xs uppercase text-center">HOME</button>
                </div>
            );

            if (view === 'admin') return (
                <div className="scroller-view bg-white text-black">
                    {toast && <div className="fixed top-8 left-1/2 -translate-x-1/2 z-[1000] bg-black text-white px-6 py-3 rounded-full text-[11px] font-bold shadow-2xl">{toast}</div>}
                    <div className="px-6 py-10 w-full max-w-4xl mx-auto pb-[400px]">
                        <header className="flex justify-between items-center mb-10 shrink-0 text-black">
                            <button onClick={() => { setView('home'); setEditingId(null); setVisualTitle(''); setVisualEntries([]); }} className="text-xl">⬅️</button>
                            <h1 className="font-black text-neutral-400 text-[10px] uppercase tracking-widest italic text-center">ADMIN PANEL</h1>
                            <div className="w-10"></div>
                        </header>
                        <div className="space-y-8">
                            <div className="bg-neutral-50 rounded-[2.5rem] p-8 border border-neutral-100 shadow-sm space-y-6 text-black">
                                <h2 className="font-black text-lg">{editingId ? '✏️ 수정 모드' : '🚀 신규 생성'}</h2>
                                <div className="flex gap-2">
                                    {['video', 'image', 'text'].map(type => (
                                        <button key={type} onClick={() => setWcType(type)} className={`flex-1 py-4 rounded-2xl font-bold text-xs border-2 transition-all ${wcType === type ? 'border-black bg-black text-white' : 'border-neutral-100 text-neutral-400 bg-white'}`}>
                                            {type === 'video' ? '📹 영상' : type === 'image' ? '🖼️ 이미지' : '💬 대사'}
                                        </button>
                                    ))}
                                </div>
                                <input value={visualTitle} onChange={e => setVisualTitle(e.target.value)} className="w-full bg-white p-5 rounded-2xl font-bold border border-neutral-100 outline-none focus:border-black shadow-inner" placeholder="제목" />
                                {wcType === 'image' ? (
                                    <div className="space-y-4">
                                        <div className="flex justify-between items-center px-1">
                                            <p className="text-[10px] font-black uppercase opacity-40 italic font-bold">Images ({visualEntries.length})</p>
                                            <button onClick={() => document.getElementById('admin-file-up').click()} className="text-[10px] font-bold text-blue-600 uppercase underline font-bold">+ 사진 추가</button>
                                            <input id="admin-file-up" type="file" multiple accept="image/*" onChange={e => {
                                                const files = Array.from(e.target.files);
                                                const processed = [];
                                                files.forEach(async (f) => {
                                                    const url = await processImage(f);
                                                    processed.push({ id: Date.now() + Math.random(), url, title: "", winCount: 0 });
                                                    if(processed.length === files.length) setVisualEntries([...visualEntries, ...processed]);
                                                });
                                            }} className="hidden" />
                                        </div>
                                        <div className="space-y-3 max-h-[350px] overflow-y-auto pr-2 text-black">
                                            {visualEntries.length === 0 && <div className="py-12 text-center text-neutral-300 text-xs italic border-2 border-dashed border-neutral-200 rounded-2xl bg-white font-bold">비어있음</div>}
                                            {visualEntries.map((entry, idx) => (
                                                <div key={idx} className="flex gap-4 bg-white p-3 rounded-2xl items-center border border-neutral-100 shadow-sm">
                                                    <img src={entry.url} className="w-14 h-14 object-cover rounded-xl shrink-0" />
                                                    <input value={entry.title} onChange={e => { const next = [...visualEntries]; next[idx].title = e.target.value; setVisualEntries(next); }} className="flex-1 bg-neutral-50 px-4 py-3 rounded-xl text-xs font-bold outline-none" placeholder="제목" />
                                                    <button onClick={() => setVisualEntries(visualEntries.filter((_, i) => i !== idx))} className="px-2 text-xs opacity-30 text-black">🗑️</button>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                ) : (
                                    <textarea value={bulkText} onChange={e => setBulkText(e.target.value)} className="w-full h-[280px] bg-white border border-neutral-100 rounded-2xl p-6 font-mono text-[11px] outline-none leading-relaxed shadow-inner text-black font-bold" placeholder="형식: 항목 사이 빈 줄 두 번" />
                                )}
                                <div className="flex gap-2">
                                    {editingId && <button onClick={() => { setEditingId(null); setVisualTitle(''); setVisualEntries([]); }} className="flex-1 bg-neutral-200 py-5 rounded-2xl font-black text-xs uppercase text-black border-none">취소</button>}
                                    <button onClick={onSave} className="flex-[2] bg-blue-600 py-5 rounded-2xl text-white font-black uppercase tracking-widest text-xs shadow-lg active:scale-95 border-none">
                                        {editingId ? '저장 완료' : '월드컵 발행'}
                                    </button>
                                </div>
                            </div>
                            <div className="pt-10 border-t border-neutral-100 space-y-4">
                                {worldcups.map(wc => (
                                    <div key={wc.id} className={`p-4 bg-white border border-neutral-100 rounded-2xl flex items-center justify-between shadow-sm transition-opacity ${wc.status === 'hidden' ? 'opacity-40 grayscale' : 'opacity-100'}`}>
                                        <div className="flex items-center gap-2 truncate text-left text-black font-black">
                                            <span className="text-sm shrink-0">{wc.type === 'video' ? '📹' : wc.type === 'image' ? '🖼️' : '💬'}</span>
                                            <span className="text-xs font-black truncate">{wc.title}</span>
                                        </div>
                                        <div className="flex gap-1.5 shrink-0 ml-4">
                                            <button onClick={() => handleStartMatch(wc)} className="w-10 h-10 bg-neutral-50 rounded-xl flex items-center justify-center text-sm border-none active:bg-neutral-100 text-black">▶️</button>
                                            <button onClick={async () => { const next = wc.status === 'hidden' ? 'published' : 'hidden'; await window.fbStore.updateDoc(window.fbStore.doc(window.fbStore.db, 'artifacts', COLLECTION_ID, 'public', 'data', 'worldcups', wc.id), {status: next}); }} className="w-10 h-10 bg-neutral-50 rounded-xl flex items-center justify-center text-sm border-none text-black">{wc.status === 'hidden' ? '🙈' : '👁️'}</button>
                                            <button onClick={() => { setEditingId(wc.id); setVisualTitle(wc.title); setVisualEntries([...wc.entries]); setWcType(wc.type || 'video'); if(wc.type!=='image') setBulkText(wc.entries.map(e => `${e.title}\n${e.url}`).join('\n\n')); document.querySelector('.scroller-view').scrollTo({ top: 0, behavior: 'smooth' }); }} className="w-10 h-10 bg-neutral-50 rounded-xl flex items-center justify-center text-sm font-bold border-none text-black">✏️</button>
                                            <button onClick={async () => { if(confirm("삭제하시겠습니까?")) { await window.fbStore.deleteDoc(window.fbStore.doc(window.fbStore.db, 'artifacts', COLLECTION_ID, 'public', 'data', 'worldcups', wc.id)); } }} className="w-10 h-10 bg-neutral-50 rounded-xl flex items-center justify-center text-sm text-red-500 border-none">🗑️</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>
                </div>
            );

            if (view === 'game') {
                const totalM = Math.floor(currentRoundItems.length / 2);
                const progress = ((matchIndex + 1) / totalM) * 100;
                return (
                    <div className="game-overlay-fixed bg-white">
                        {zoomUrl && (
                            <div className="fixed inset-0 z-[1000] bg-black/95 flex flex-col items-center justify-center p-4 modal-bg-ani" onClick={() => setZoomUrl(null)}>
                                <div className="absolute top-12 right-6 z-[1001] w-10 h-10 bg-white/20 rounded-full flex items-center justify-center shadow-lg text-white font-bold text-black font-black">✕</div>
                                <img src={zoomUrl} className="max-w-full max-h-[85vh] object-contain shadow-2xl rounded-lg" alt="Full" />
                                <p className="mt-8 text-white/40 text-[9px] font-bold tracking-[0.4em] uppercase text-center font-medium font-bold">TAP TO CLOSE</p>
                            </div>
                        )}
                        {!champion && <div className="w-full h-0.5 bg-neutral-100 shrink-0"><div className="h-full bg-black progress-bar-fill" style={{ width: `${progress}%` }} /></div>}
                        
                        {champion ? (
                            <div className="flex-1 flex flex-col items-center p-4 text-center fade-in-ani overflow-hidden text-black">
                                <div className="mt-[10vh] mb-6 flex flex-col items-center shrink-0 w-full text-black">
                                    <div className="text-5xl mb-4 text-center">🏆</div>
                                    <h2 className="text-base font-black px-6 truncate max-w-sm tracking-tight">{champion.title}</h2>
                                    <div className="bg-yellow-400 px-4 py-1 rounded-full shadow-sm mt-3 border-none font-bold uppercase"><span className="text-[10px]">🏆 TOTAL WINS: {champion.winCount || 0}</span></div>
                                </div>
                                <div className="w-full flex-1 flex items-center justify-center min-h-0 mb-10 overflow-hidden text-black px-0.5">
                                    <ItemUI item={champion} type={selectedWc.type} isResult={true} />
                                </div>
                                <div className="w-full flex justify-center shrink-0 bottom-safe-padding px-8 pb-10">
                                    <button onClick={() => {setView('home'); setChampion(null); setRankingWc(null);}} className="w-full max-w-[280px] h-14 bg-black rounded-2xl shadow-xl flex items-center justify-center border-none font-black text-white text-sm tracking-[0.3em] text-center uppercase">HOME</button>
                                </div>
                            </div>
                        ) : (
                            <>
                                <header className="h-14 shrink-0 flex items-center justify-between px-6 border-b border-neutral-100 bg-white text-black z-[110]">
                                    <div className="flex flex-col text-left">
                                        <span className="text-[10px] font-black text-blue-600 uppercase tracking-tighter font-black">{roundName}</span>
                                        <h1 className="text-xs font-bold truncate max-w-[140px] mt-1 text-black font-black">{selectedWc?.title}</h1>
                                    </div>
                                    <div className="flex items-center gap-3">
                                        <div className="px-2.5 py-0.5 bg-black rounded-full text-white text-[9px] font-black flex items-center h-5">{matchIndex + 1} / {totalM}</div>
                                        <button onClick={() => setView('home')} className="p-1 opacity-20 text-lg text-black font-bold border-none bg-transparent text-black">✕</button>
                                    </div>
                                </header>
                                <main className="flex-1 flex flex-col min-h-0 py-2 bg-white relative text-black overflow-hidden">
                                    <div className="flex-1 min-h-0 relative flex flex-col px-0.5">
                                        <ItemUI item={currentRoundItems[matchIndex * 2]} type={selectedWc.type} onPick={onSelectItem} />
                                    </div>
                                    <div className="h-10 flex items-center justify-center relative shrink-0">
                                        <div className="absolute w-full h-[1px] bg-neutral-100"></div>
                                        <div className="relative z-10 px-4 bg-white text-[11px] font-black italic opacity-20 uppercase text-black">VS</div>
                                    </div>
                                    <div className="flex-1 min-h-0 relative flex flex-col px-0.5">
                                        {currentRoundItems[matchIndex * 2 + 1] 
                                            ? <ItemUI item={currentRoundItems[matchIndex * 2 + 1]} type={selectedWc.type} onPick={onSelectItem} /> 
                                            : <div className="flex-1 flex items-center justify-center text-[10px] opacity-20 font-bold italic text-black uppercase text-center font-black">Auto Win</div>
                                        }
                                    </div>
                                </main>
                                <footer className="shrink-0 grid grid-cols-2 gap-4 px-6 py-10 bottom-safe-padding bg-white border-t border-neutral-50 shadow-[0_-10px_40px_rgba(0,0,0,0.02)] z-[110]">
                                    <button onClick={() => onSelectItem(currentRoundItems[matchIndex * 2])} className="h-16 bg-[#FF4646] rounded-2xl flex items-center justify-center active:opacity-80 shadow-md font-black text-white text-xl border-none uppercase">UP</button>
                                    <button onClick={() => currentRoundItems[matchIndex * 2 + 1] && onSelectItem(currentRoundItems[matchIndex * 2 + 1])} disabled={!currentRoundItems[matchIndex * 2 + 1]} className="h-16 bg-[#4673FF] rounded-2xl flex items-center justify-center active:opacity-80 shadow-md font-black text-white text-xl disabled:opacity-10 border-none uppercase">DOWN</button>
                                </footer>
                            </>
                        )}
                    </div>
                );
            }
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
