                    </div>
                </div>
            `;
            document.body.appendChild(overlay);

            const input = document.getElementById('admin-password-input');
            const errorMsg = document.getElementById('prompt-error');
            input.focus();

            document.getElementById('prompt-cancel').onclick = () => overlay.remove();
            
            const submit = () => {
                if (input.value === '1028hqwc') {
                    overlay.remove();
                    onSuccess();
                } else {
                    errorMsg.classList.remove('hidden');
                    input.value = '';
                    input.focus();
                }
            };

            document.getElementById('prompt-submit').onclick = submit;
            input.onkeypress = (e) => { if (e.key === 'Enter') submit(); };
        };

        async function initFirebase() {
            try {
                const app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
                cupsCollectionRef = collection(db, 'worldcups');

                await signInAnonymously(auth);

                onAuthStateChanged(auth, async (user) => {
                    if (user) {
                        onSnapshot(cupsCollectionRef, (snapshot) => {
                            const loadedCups = [];
                            snapshot.forEach((doc) => {
                                loadedCups.push(doc.data());
                            });
                            
                            loadedCups.sort((a, b) => a.id - b.id);
                            
                            if (loadedCups.length === 0) {
                                WORLD_CUPS = [...defaultCups];
                                defaultCups.forEach(cup => saveCupToDb(cup)); 
                            } else {
                                WORLD_CUPS = loadedCups;
                            }
                            
                            isDbLoaded = true;
                            window.render();
                        }, (error) => {
                            console.error("Firestore Error:", error);
                            isDbLoaded = true;
                            window.render();
                        });
                    }
                });
            } catch(e) {
                console.error("Firebase init failed", e);
                window.showAlert("데이터베이스 연결에 실패했습니다.");
                WORLD_CUPS = [...defaultCups];
                isDbLoaded = true;
                window.render();
            }
        }

        async function saveCupToDb(cup) {
            if (!db || !auth || !auth.currentUser) return;
            try {
                await setDoc(doc(cupsCollectionRef, cup.id.toString()), cup);
            } catch(e) { console.error(e); }
        }

        async function deleteCupFromDb(cupId) {
            if (!db || !auth || !auth.currentUser) return;
            try {
                await deleteDoc(doc(cupsCollectionRef, cupId.toString()));
            } catch(e) { console.error(e); }
        }

        window.render = function() {
            if (!isDbLoaded) return; 
            
            const mainHeader = document.getElementById('main-header');
            const headerTitle = document.getElementById('header-title');
            
            if (currentView === 'home') {
                mainHeader.style.display = 'none';
                window.renderHome();
            } else if (currentView === 'game') {
                mainHeader.style.display = 'block'; 
                headerTitle.innerHTML = `<span class="text-base font-bold text-gray-800">${selectedCup.title}</span>`;
                window.renderGame();
            } else if (currentView === 'result') {
                mainHeader.style.display = 'block';
                headerTitle.innerHTML = `<span class="text-base font-bold text-gray-800">최종 결과</span>`;
                window.renderResult();
            } else if (currentView === 'admin') {

                headerTitle.innerHTML = `<span class="text-base font-bold text-gray-800">관리자 모드</span>`;
                window.renderAdmin();
            }

        window.addBulkItems = async function() {
            const cupId = parseInt(document.getElementById('admin-cup-id').value);
            if(isNaN(cupId)) return window.showAlert('월드컵을 먼저 생성하고 선택해주세요.');

            const text = document.getElementById('admin-bulk').value;
            const lines = text.split('\n').map(l => l.trim()).filter(l => l);
            
            let itemsToAdd = [];
            let currentTitle = "";
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i];
                if (line.startsWith('http') || line.includes('twitter.com') || line.includes('x.com') || line.includes('twimg.com')) {
                    if (!line.startsWith('http')) line = 'https://' + line;

                    if (currentTitle) {
                        let dateMatch = currentTitle.match(/^(\d{6})\s+(.*)/);
                        let date = "";
                        let name = currentTitle;
                        if(dateMatch) {
                            date = dateMatch[1];
                            name = dateMatch[2];
                        }

                        let isDirectMedia = line.includes('pbs.twimg.com') || line.match(/\.(jpeg|jpg|gif|png|webp|mp4)(\?.*)?$/i);
                        let mediaUrl = isDirectMedia ? line : null;
                        let isVideo = line.includes('.mp4');

                        itemsToAdd.push({
                            id: Date.now() + i,
                            name: name,
                            date: date,
                            sourceUrl: line,
                            mediaUrl: mediaUrl,
                            isVideo: isVideo,
                            emoji: ""
                        });
                        currentTitle = "";
                    }
                } else {
                    currentTitle = line;
                }
            }

            if (itemsToAdd.length === 0) {
                return window.showAlert("형식에 맞는 데이터가 없습니다.\n\n[타이틀]\n[링크]\n형태로 줄바꿈하여 입력해주세요.");
            }

            const cup = WORLD_CUPS.find(c => c.id === cupId);
            cup.items.push(...itemsToAdd);
            
            document.getElementById('admin-bulk').value = '';
            window.updateAdminList();
            
            await saveCupToDb(cup);
            window.showAlert(`성공!\n총 ${itemsToAdd.length}개의 항목이 추가되었습니다.`);
        };

        function getMediaInnerHtml(item, isResult = false) {
            if (item.mediaUrl === 'error') {
                return `<div class="absolute inset-0 flex flex-col items-center justify-center p-4 text-center bg-gray-100 text-gray-400"><i class="fa-solid fa-triangle-exclamation text-3xl mb-2"></i><span class="text-xs">미디어 없음</span></div>`;
            }
            if (item.sourceUrl && !item.mediaUrl) {
                return `<div class="absolute inset-0 flex flex-col items-center justify-center p-4 text-center bg-gray-50"><i class="fa-solid fa-spinner fa-spin text-3xl text-gray-300"></i></div>`;
            }
            if (item.mediaUrl) {
                let html = '';
                if (item.isVideo) {
                    html += `<video src="${item.mediaUrl}" autoplay loop muted playsinline class="absolute inset-0 w-full h-full object-cover"></video>
                             <div class="absolute inset-0 bg-gradient-to-t from-black/40 via-transparent to-black/10"></div>
                             <i class="fa-solid fa-video text-white/80 absolute top-4 right-4 text-sm drop-shadow-md z-10"></i>`;
                } else {
                    html += `<img src="${item.mediaUrl}" class="absolute inset-0 w-full h-full object-cover" />
                             <div class="absolute inset-0 bg-gradient-to-t from-black/30 via-transparent to-transparent"></div>`;
                }
                if (!isResult) {
                    html += `<div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity z-20"><span class="text-white font-bold bg-black/60 px-4 py-2 rounded-full text-sm backdrop-blur-sm"><i class="fa-solid fa-expand mr-1"></i> 크게 보기</span></div>`;
                }
                return html;
            }
            const sizeClass = isResult ? 'text-8xl mb-6 drop-shadow-md animate-bounce' : 'text-6xl mb-2 drop-shadow-sm';
            return `<div class="absolute inset-0 flex flex-col items-center justify-center p-4 text-center"><span class="${sizeClass}">${item.emoji}</span></div>`;
        }

        async function loadMediaIfNeeded(item, containerId, isResult = false) {
            if (item.mediaUrl) {
                const container = document.getElementById(containerId);
                if (container) container.innerHTML = getMediaInnerHtml(item, isResult);
                return;
            }
            if (!item.sourceUrl) return; 

            if (item.sourceUrl.includes('pbs.twimg.com') || item.sourceUrl.match(/\.(jpeg|jpg|gif|png|webp|mp4)(\?.*)?$/i)) {
                item.mediaUrl = item.sourceUrl;
                item.isVideo = item.sourceUrl.includes('.mp4');
                if(selectedCup) {
                    if (selectedCup.id === 'master') {
                        let origCup = WORLD_CUPS.find(c => c.items.some(i => i.id === item.id));
                        if(origCup) saveCupToDb(origCup);
                    } else {
                        saveCupToDb(selectedCup); 
                    }
                }
                const container = document.getElementById(containerId);
                if (container) container.innerHTML = getMediaInnerHtml(item, isResult);
                return;
            }

            try {
                const urlObj = new URL(item.sourceUrl);
                const apiUrl = `https://api.vxtwitter.com${urlObj.pathname}`;
                const res = await fetch(apiUrl);
                if (!res.ok) throw new Error('API Error');
                const data = await res.json();
                
                if (data.mediaURLs && data.mediaURLs.length > 0) {
                    item.mediaUrl = data.mediaURLs[0];
                    item.isVideo = item.mediaUrl.endsWith('.mp4');
                    if(selectedCup) {
                        if (selectedCup.id === 'master') {
                            let origCup = WORLD_CUPS.find(c => c.items.some(i => i.id === item.id));
                            if(origCup) saveCupToDb(origCup);
                        } else {
                            saveCupToDb(selectedCup); 
                        }
                    }
                } else {
                    item.mediaUrl = 'error'; 
                }
            } catch (e) {
                item.mediaUrl = 'error';
            }
            
            const container = document.getElementById(containerId);
            if (container) {
                container.innerHTML = getMediaInnerHtml(item, isResult);
            }
        }

                    <div onclick="window.openWinnerMedia()" id="img-card-winner" class="w-full max-w-[280px] mx-auto aspect-square bg-gray-800 rounded-[32px] shadow-lg relative overflow-hidden mb-8 transform hover:scale-105 transition-transform duration-500 bg-gray-100 cursor-pointer group">
                        ${getMediaInnerHtml(winner, true)}
                        <div class="absolute inset-0 bg-black/20 opacity-0 group-hover:opacity-100 flex items-center justify-center transition-opacity z-20"><span class="text-white font-bold bg-black/60 px-4 py-2 rounded-full text-sm backdrop-blur-sm"><i class="fa-solid fa-expand mr-1"></i> 크게 보기</span></div>
                    </div>

                    <div class="bg-white/80 rounded-[20px] p-5 card-shadow border border-white mb-8">
                        <h3 class="font-black text-xl text-gray-800 mb-1">${winner.emoji ? winner.emoji + ' ' : ''}${winner.name}</h3>
                        <p class="text-gray-400 text-sm font-medium">Date: ${winner.date || 'Unknown'}</p>
                    </div>

                    <div class="flex flex-col gap-3 w-full">
                        <button onclick="window.showBracketModal(${selectedCup.id === 'master' ? "'master'" : selectedCup.id})" class="w-full py-4 bg-white text-gray-800 font-bold rounded-2xl border border-gray-100 shadow-sm flex items-center justify-center gap-2">
                            <i class="fa-solid fa-rotate-right"></i> 다시 하기
                        </button>
                        <button onclick="window.goHome()" class="w-full py-4 bg-gray-100 text-gray-500 font-bold rounded-2xl shadow-sm flex items-center justify-center gap-2">
                            <i class="fa-solid fa-house"></i> 메인으로 돌아가기
                        </button>
                    </div>
                </div>
            `;
            appContent.innerHTML = html;
            
            loadMediaIfNeeded(winner, `img-card-winner`, true);
        };

        window.startCup = function(cupId, size) {
            window.closeBracketModal();
            selectedCup = cupId === 'master' ? window.getMasterCup() : WORLD_CUPS.find(c => c.id === cupId);
            
            let itemsToPlay = [...selectedCup.items].sort(() => Math.random() - 0.5);
            roundItems = itemsToPlay.slice(0, size);
            nextRoundItems = [];
            matchIndex = 0;
            currentView = 'game';
            
            setTimeout(window.render, 300);
        };

        window.handlePick = function(itemId) {
            if (isTransitioning) return;
            isTransitioning = true;

            const selectedItem = roundItems.find(i => i.id === itemId);
            const otherItem = roundItems.find(i => i.id !== itemId && (i === roundItems[matchIndex] || i === roundItems[matchIndex + 1]));

            document.getElementById(`img-card-${selectedItem.id}`).classList.add('selected-item');
            document.getElementById(`btn-${selectedItem.id}`).classList.add('selected-item');
            document.getElementById(`img-card-${otherItem.id}`).classList.add('unselected-item');
            document.getElementById(`btn-${otherItem.id}`).classList.add('unselected-item');

            setTimeout(() => {
                nextRoundItems.push(selectedItem);
                
                if (matchIndex + 2 >= roundItems.length) {
                    if (nextRoundItems.length === 1) {
                        winner = nextRoundItems[0];
                        currentView = 'result';
                    } else {
                        roundItems = [...nextRoundItems];
                        nextRoundItems = [];
                        matchIndex = 0;
                    }
                } else {
                    matchIndex += 2;
                }
                
                isTransitioning = false;
                window.render();
            }, 500);
        };

        window.goHome = function() {
            selectedCup = null;
            winner = null;
            roundItems = [];
            nextRoundItems = [];
            matchIndex = 0;
            currentView = 'home';
            window.render();
        };

        window.goAdmin = function() {
            window.showPasswordPrompt(() => {
                currentView = 'admin';
                window.render();
            });
        };

        window.openMediaById = function(itemId) {
            const item = roundItems.find(i => i.id === itemId);
            if (item && item.mediaUrl && item.mediaUrl !== 'error') {
                window.showFullMedia(item.mediaUrl, item.isVideo);
            }
        };

        window.openWinnerMedia = function() {
            if (winner && winner.mediaUrl && winner.mediaUrl !== 'error') {
                window.showFullMedia(winner.mediaUrl, winner.isVideo);
            }
        };

        window.showFullMedia = function(mediaUrl, isVideo) {
            const modal = document.getElementById('media-modal');
            const content = document.getElementById('media-modal-content');
            
            if (isVideo) {
                content.innerHTML = `<video src="${mediaUrl}" controls autoplay playsinline class="max-w-full max-h-[90vh] rounded-xl shadow-2xl object-contain"></video>`;
            } else {
                content.innerHTML = `<img src="${mediaUrl}" class="max-w-full max-h-[90vh] rounded-xl shadow-2xl object-contain" />`;
            }
            
            modal.classList.remove('hidden');
        };

        window.closeFullMedia = function() {
            const modal = document.getElementById('media-modal');
            const content = document.getElementById('media-modal-content');
            modal.classList.add('hidden');
            content.innerHTML = ''; 
        };

        initFirebase();
    </script>
</body>
</html>
