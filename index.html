<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>비디오 월드컵</title>
    <!-- 라이브러리 로드 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@0.321.0/dist/umd/lucide.min.js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBvvsLBtIQ92fRe5VkgKbO9-dGr1n6OXvM",
            authDomain: "hqworldcup-b69fc.firebaseapp.com",
            projectId: "hqworldcup-b69fc",
            storageBucket: "hqworldcup-b69fc.firebasestorage.app",
            messagingSenderId: "107833310403",
            appId: "1:107833310403:web:e8d60c03081d1c62bd7676",
            measurementId: "G-704LTTY9JB"
        };

        window.fb = { initializeApp, getAuth, signInAnonymously, getFirestore, collection, addDoc, onSnapshot, serverTimestamp };
        window.fbConfig = firebaseConfig;
    </script>

    <style>
        body { -webkit-tap-highlight-color: transparent; font-family: sans-serif; background-color: white; color: black; margin: 0; padding: 0; overflow: hidden; }
        .twitter-tweet { margin: 0 !important; display: flex !important; justify-content: center !important; width: 100% !important; }
        .twitter-tweet-rendered { width: 100% !important; max-width: 500px !important; margin: 0 !important; border: none !important; box-shadow: none !important; }
        iframe { border-radius: 12px !important; border: none !important; }
        input, textarea { font-size: 16px !important; }
        .game-container { height: 100vh; display: flex; flex-direction: column; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        
        const Icon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    lucide.createIcons({ attrs: { stroke: 'currentColor', 'stroke-width': 2 }, nameMap: { [name]: iconRef.current } });
                }
            }, [name]);
            return <i data-lucide={name} style={{ width: size, height: size }} className={className}></i>;
        };

        const App = () => {
            const [view, setView] = useState('home'); 
            const [worldcups, setWorldcups] = useState([]);
            const [selectedWorldcup, setSelectedWorldcup] = useState(null);
            const [champion, setChampion] = useState(null);
            const [matchIndex, setMatchIndex] = useState(0);
            const [currentRoundItems, setCurrentRoundItems] = useState([]);
            const [winners, setWinners] = useState([]);
            const [roundName, setRoundName] = useState('');
            const [adminPassword, setAdminPassword] = useState('');
            const [bulkText, setBulkText] = useState('');
            const [db, setDb] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const init = async () => {
                    if(!window.fb) return;
                    try {
                        const app = window.fb.initializeApp(window.fbConfig);
                        const auth = window.fb.getAuth(app);
                        const firestore = window.fb.getFirestore(app);
                        setDb(firestore);
                        await window.fb.signInAnonymously(auth);
                        
                        const appId = "twitter-video-wc-pro";
                        const wcRef = window.fb.collection(firestore, 'artifacts', appId, 'public', 'data', 'worldcups');
                        window.fb.onSnapshot(wcRef, (snapshot) => {
                            const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                            setWorldcups(docs);
                            setLoading(false);
                        });
                    } catch (e) { console.error(e); }
                };
                init();
                const script = document.createElement('script');
                script.src = "https://platform.twitter.com/widgets.js";
                script.async = true;
                document.body.appendChild(script);
            }, []);

            useEffect(() => {
                if (window.twttr && window.twttr.widgets) window.twttr.widgets.load();
            }, [view, matchIndex, champion, selectedWorldcup]);

            const handleAdminLogin = () => {
                if (adminPassword === '0000') {
                    setView('admin');
                    setAdminPassword('');
                } else {
                    alert('비밀번호가 틀렸습니다.');
                }
            };

            const startTournament = (wc) => {
                setSelectedWorldcup(wc);
                const shuffled = [...wc.entries].sort(() => Math.random() - 0.5);
                initRound(shuffled);
                setView('game');
            };

            const initRound = (items) => {
                setCurrentRoundItems(items);
                setWinners([]);
                setMatchIndex(0);
                const count = items.length;
                if (count > 16) setRoundName("32강");
                else if (count > 8) setRoundName("16강");
                else if (count > 4) setRoundName("8강");
                else if (count > 2) setRoundName("4강");
                else if (count === 2) setRoundName("결승전");
            };

            const selectWinner = (winner) => {
                const newWinners = [...winners, winner];
                setWinners(newWinners);
                if ((matchIndex + 1) * 2 < currentRoundItems.length) {
                    setMatchIndex(matchIndex + 1);
                } else {
                    if (newWinners.length === 1) setChampion(newWinners[0]);
                    else initRound(newWinners);
                }
            };

            if (view === 'home') return (
                <div className="h-screen flex flex-col p-6 bg-white overflow-y-auto">
                    <header className="py-12 text-center flex flex-col items-center">
                        <div className="p-5 bg-neutral-50 rounded-[2rem] mb-4 border border-neutral-100">
                            <Icon name="trophy" className="text-yellow-500" size={48} />
                        </div>
                        <h1 className="text-3xl font-black tracking-tighter">VIDEO WORLDCUP</h1>
                    </header>
                    <div className="space-y-4 pb-24">
                        {loading ? <div className="text-center py-10 text-neutral-300 font-bold">불러오는 중...</div> :
                         worldcups.length === 0 ? <div className="text-center py-10 text-neutral-400 font-bold">등록된 월드컵이 없습니다.</div> :
                         worldcups.map(wc => (
                            <button key={wc.id} onClick={() => startTournament(wc)} className="w-full bg-white p-6 rounded-[2rem] border border-neutral-100 shadow-sm flex items-center justify-between active:scale-95 transition-all">
                                <div className="text-left truncate mr-4">
                                    <h2 className="text-lg font-black text-neutral-800 truncate">{wc.title}</h2>
                                    <p className="text-[10px] text-neutral-400 font-bold tracking-widest">{wc.entries.length} VIDEOS</p>
                                </div>
                                <Icon name="play" className="text-blue-500" size={20} />
                            </button>
                        ))}
                    </div>
                    <button onClick={() => setView('admin_auth')} className="fixed bottom-8 right-8 w-14 h-14 bg-black text-white rounded-full flex items-center justify-center shadow-2xl active:scale-90">
                        <Icon name="settings" size={24} />
                    </button>
                </div>
            );

            if (view === 'admin_auth') return (
                <div className="h-screen flex flex-col items-center justify-center p-8 bg-neutral-50">
                    <div className="w-full max-w-xs space-y-6 text-center">
                        <Icon name="lock" size={48} className="text-neutral-300 mx-auto" />
                        <h2 className="text-2xl font-black">ADMIN</h2>
                        <input type="password" value={adminPassword} onChange={e => setAdminPassword(e.target.value)} onKeyDown={e => e.key === 'Enter' && handleAdminLogin()} className="w-full border-2 border-neutral-200 rounded-2xl p-4 text-center text-2xl tracking-[0.5em] outline-none bg-white focus:border-black" placeholder="****" autoFocus />
                        <button onClick={handleAdminLogin} className="w-full bg-black text-white font-bold py-5 rounded-2xl shadow-xl">입장하기</button>
                        <button onClick={() => setView('home')} className="w-full text-neutral-400 font-bold">취소</button>
                    </div>
                </div>
            );

            if (view === 'admin') return (
                <div className="h-screen flex flex-col p-6 bg-white">
                    <header className="flex justify-between items-center mb-6">
                        <button onClick={() => setView('home')} className="p-2"><Icon name="arrow-left" /></button>
                        <h1 className="font-black tracking-widest text-neutral-400">ADMIN PANEL</h1>
                        <div className="w-10"></div>
                    </header>
                    <textarea value={bulkText} onChange={e => setBulkText(e.target.value)} className="flex-1 w-full bg-neutral-50 border border-neutral-100 rounded-[2rem] p-5 font-mono text-[11px] outline-none mb-6" placeholder="월드컵제목, 영상제목, 링크..." />
                    <button onClick={async (e) => {
                        if(!bulkText.trim()) return;
                        const btn = e.currentTarget;
                        btn.disabled = true; btn.innerText = "저장 중...";
                        const lines = bulkText.trim().split('\n');
                        const title = lines[0].split(',')[0].trim();
                        const entries = lines.map((l, i) => {
                            const p = l.split(',').map(s => s.trim());
                            return p.length >= 3 ? { id: i, title: p[1], url: p[2].replace('x.com', 'twitter.com') } : null;
                        }).filter(Boolean);
                        try {
                            const appId = "twitter-video-wc-pro";
                            await window.fb.addDoc(window.fb.collection(db, 'artifacts', appId, 'public', 'data', 'worldcups'), { title, entries, createdAt: window.fb.serverTimestamp() });
                            setView('home'); setBulkText('');
                        } catch(err) { alert("오류: " + err.message); btn.disabled = false; btn.innerText = "발행하기"; }
                    }} className="bg-blue-600 text-white font-black py-5 rounded-[2rem] shadow-xl">월드컵 발행하기</button>
                </div>
            );

            if (view === 'game') {
                if (champion) return (
                    <div className="h-screen flex flex-col items-center justify-center p-8 bg-white text-center">
                        <Icon name="trophy" className="text-yellow-500 mb-4" size={56} />
                        <h2 className="text-3xl font-black mb-8 leading-tight">{champion.title}</h2>
                        <div className="w-full max-w-[480px] aspect-square flex items-center justify-center rounded-[2.5rem] overflow-hidden bg-neutral-50 border border-neutral-100 mb-10 shadow-2xl relative">
                            <div className="scale-90 w-full flex justify-center"><blockquote className="twitter-tweet" data-theme="light"><a href={champion.url}></a></blockquote></div>
                        </div>
                        <button onClick={() => {setView('home'); setChampion(null);}} className="w-full max-w-xs bg-black text-white font-black py-5 rounded-[2rem] shadow-2xl flex items-center justify-center gap-2"><Icon name="home" size={18} /> 목록으로</button>
                    </div>
                );
                return (
                    <div className="game-container bg-white">
                        <header className="h-14 flex items-center justify-between px-6 border-b border-neutral-50 shrink-0">
                            <div className="flex flex-col"><span className="text-[10px] font-black text-blue-600 leading-none">{roundName}</span><h1 className="text-xs font-bold truncate max-w-[180px] mt-1 text-neutral-800">{selectedWorldcup.title}</h1></div>
                            <button onClick={() => setView('home')} className="p-2"><Icon name="x" className="text-neutral-300" /></button>
                        </header>
                        <main className="flex-1 flex flex-col min-h-0">
                            <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
                                <div className="py-2 px-4 text-center text-xs font-black text-neutral-800 truncate">{currentRoundItems[matchIndex * 2].title}</div>
                                <div className="flex-1 flex items-center justify-center overflow-hidden"><div className="scale-[0.82] w-full flex justify-center"><blockquote className="twitter-tweet" data-theme="light" data-media-max-width="550"><a href={currentRoundItems[matchIndex * 2].url}></a></blockquote></div></div>
                            </div>
                            <div className="h-4 flex items-center justify-center relative shrink-0"><div className="w-full h-[1px] bg-neutral-100"></div><div className="relative z-10 px-2 bg-white text-[9px] font-black text-neutral-300">VS</div></div>
                            <div className="flex-1 flex flex-col min-h-0 overflow-hidden">
                                {currentRoundItems[matchIndex * 2 + 1] ? <>
                                    <div className="py-2 px-4 text-center text-xs font-black text-neutral-800 truncate">{currentRoundItems[matchIndex * 2 + 1].title}</div>
                                    <div className="flex-1 flex items-center justify-center overflow-hidden"><div className="scale-[0.82] w-full flex justify-center"><blockquote className="twitter-tweet" data-theme="light" data-media-max-width="550"><a href={currentRoundItems[matchIndex * 2 + 1].url}></a></blockquote></div></div>
                                </> : <div className="flex-1 flex items-center justify-center text-xs text-neutral-300 italic font-bold">부전승 매치</div>}
                            </div>
                        </main>
                        <footer className="h-24 grid grid-cols-2 gap-4 px-5 pb-8 pt-2 bg-white border-t border-neutral-50 shadow-lg">
                            <button onClick={() => selectWinner(currentRoundItems[matchIndex * 2])} className="bg-[#FF4646] text-white rounded-2xl flex flex-col items-center justify-center shadow-md active:scale-95"><Icon name="chevron-up" /><span className="font-black text-xs">UP SELECT</span></button>
                            <button onClick={() => currentRoundItems[matchIndex * 2 + 1] && selectWinner(currentRoundItems[matchIndex * 2 + 1])} disabled={!currentRoundItems[matchIndex * 2 + 1]} className="bg-[#4673FF] text-white rounded-2xl flex flex-col items-center justify-center shadow-md active:scale-95 disabled:opacity-10"><Icon name="chevron-down" /><span className="font-black text-xs">DOWN SELECT</span></button>
                        </footer>
                    </div>
                );
            }
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
